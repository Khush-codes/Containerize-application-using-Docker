name: Build & Push Docker Images

on:
  push:
    branches:
      - main  # jab main branch me push ho

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        run: |
          docker build -t khushikose/devops-frontend:latest ./frontend
          docker push khushikose/devops-frontend:latest

      - name: Build and push backend image
        run: |
          docker build -t khushikose/devops-backend:latest ./backend
          docker push khushikose/devops-backend:latest
